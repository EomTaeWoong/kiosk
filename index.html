<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>키오스크 주문</title>
    <style>
        body { text-align: center; font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; }
        .kiosk-screen {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .kiosk-screen img {
            width: 100%;
            height: auto;
            display: block;
        }
        .touch-area {
            position: absolute;
            background-color: rgba(255, 0, 0, 0.3); /* 테스트 완료 후 투명하게 하려면 rgba(0,0,0,0)으로 변경 */
            cursor: pointer;
            border: none;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="kiosk-screen">
        <img src="1784606152885(1).jpg" alt="메뉴판">

        <!-- 1열: 싸다김밥 -->
        <button class="touch-area" style="top: 20%; left: 5%; width: 20%; height: 15%;" 
                onclick="sendOrder('싸다김밥', '4,000')"></button>

        <!-- 2열: 제육김밥 -->
        <button class="touch-area" style="top: 20%; left: 27%; width: 20%; height: 15%;" 
                onclick="sendOrder('제육김밥', '5,500')"></button>
        
        <!-- 3열: 치즈김밥 -->
        <button class="touch-area" style="top: 20%; left: 50%; width: 20%; height: 15%;" 
                onclick="sendOrder('치즈김밥', '4,500')"></button>
    </div>

    <script>
        // 🚨 여기에 Formspree에서 발급받은 주소를 넣으세요
        const NOTIFY_URL = 'https://formspree.io/f/xdaqdnal';

        function sendOrder(menuName, price) {
            // 1. 손님에게 보여줄 확인창 (취소 누르면 전송 안 됨)
            if (!confirm(`[${menuName}] ${price}원\n주문하시겠습니까?`)) {
                return; 
            }

            // 2. 사장님께 보낼 메시지 내용
            const messageText = `나${menuName}이 ${price} 주문 접수되었습니다.`;
            
            // 3. 백그라운드 자동 전송 (손님 화면 안 바뀜)
            fetch(NOTIFY_URL, {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    '주문내용': messageText
                })
            })
            .then(response => {
                if(response.ok) {
                    alert('주문이 완료되었습니다!');
                } else {
                    alert('주문 전송에 실패했습니다.');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('네트워크 오류가 발생했습니다.');
            });
        }
    </script>
</body>
</html>
