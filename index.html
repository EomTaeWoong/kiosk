<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>키오스크 주문</title>
    <style>
        body { text-align: center; font-family: sans-serif; background-color: #f4f4f4; margin: 0; padding: 10px; }
        .kiosk-screen {
            position: relative;
            display: inline-block;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .kiosk-screen img {
            width: 100%;
            height: auto;
            display: block;
        }
        /* 터치 영역 (평소에는 완전히 투명하게 처리) */
        .touch-area {
            position: absolute;
            background-color: transparent; /* 완전 투명 */
            cursor: pointer;
            border: none;
            border-radius: 10px;
        }
        /* 영역을 테스트하고 싶을 때만 아래 주석을 풀고 사용하세요 */
        /* .touch-area { background-color: rgba(255, 0, 0, 0.3); border: 1px dashed red; } */
    </style>
</head>
<body>

    <div class="kiosk-screen">
        <img src="1784606152885(1).jpg" alt="메뉴판">

        <!-- [1행 메뉴] -->
        <!-- 싸다김밥 -->
        <button class="touch-area" style="top: 31%; left: 5%; width: 17%; height: 20%;" 
                onclick="sendOrder('싸다김밥', '4,000')"></button>
        <!-- 제육김밥 -->
        <button class="touch-area" style="top: 31%; left: 24.5%; width: 17%; height: 20%;" 
                onclick="sendOrder('제육김밥', '5,500')"></button>
        <!-- 치즈김밥 -->
        <button class="touch-area" style="top: 31%; left: 44%; width: 17%; height: 20%;" 
                onclick="sendOrder('치즈김밥', '4,500')"></button>
        <!-- 샐러드김밥 -->
        <button class="touch-area" style="top: 31%; left: 63.5%; width: 17%; height: 20%;" 
                onclick="sendOrder('샐러드김밥', '4,500')"></button>
        <!-- 참치김밥 -->
        <button class="touch-area" style="top: 31%; left: 83%; width: 17%; height: 20%;" 
                onclick="sendOrder('참치김밥', '5,000')"></button>

        <!-- [2행 메뉴] -->
        <!-- 묵은지참치김밥 -->
        <button class="touch-area" style="top: 53.5%; left: 5%; width: 17%; height: 20%;" 
                onclick="sendOrder('묵은지참치김밥', '5,500')"></button>
        <!-- 통새우김밥 -->
        <button class="touch-area" style="top: 53.5%; left: 24.5%; width: 17%; height: 20%;" 
                onclick="sendOrder('통새우김밥', '5,500')"></button>
        <!-- 돈까스김밥 -->
        <button class="touch-area" style="top: 53.5%; left: 44%; width: 17%; height: 20%;" 
                onclick="sendOrder('돈까스김밥', '5,500')"></button>
        <!-- 킹스팸김밥 -->
        <button class="touch-area" style="top: 53.5%; left: 63.5%; width: 17%; height: 20%;" 
                onclick="sendOrder('킹스팸김밥', '5,500')"></button>
        <!-- 소고기김밥 -->
        <button class="touch-area" style="top: 53.5%; left: 83%; width: 17%; height: 20%;" 
                onclick="sendOrder('소고기김밥', '5,500')"></button>

        <!-- [3행 메뉴] -->
        <!-- 멸치고추김밥 -->
        <button class="touch-area" style="top: 76%; left: 5%; width: 17%; height: 20%;" 
                onclick="sendOrder('멸치고추김밥', '5,000')"></button>
        <!-- 소세지계란김밥 -->
        <button class="touch-area" style="top: 76%; left: 24.5%; width: 17%; height: 20%;" 
                onclick="sendOrder('소세지계란김밥', '5,500')"></button>
        <!-- 통통계란김밥 -->
        <button class="touch-area" style="top: 76%; left: 44%; width: 17%; height: 20%;" 
                onclick="sendOrder('통통계란김밥', '6,000')"></button>
        <!-- 포장용기 -->
        <button class="touch-area" style="top: 76%; left: 63.5%; width: 17%; height: 20%;" 
                onclick="sendOrder('포장용기', '500')"></button>
        <!-- 국물포장용기 -->
        <button class="touch-area" style="top: 76%; left: 83%; width: 17%; height: 20%;" 
                onclick="sendOrder('국물포장용기', '200')"></button>
    </div>

    <script>
        // 🚨 본인의 Formspree 주소를 입력하세요
        const NOTIFY_URL = 'https://formspree.io/f/xdaqdnal';

        function sendOrder(menuName, price) {
            if (!confirm(`[${menuName}] ${price}원\n주문하시겠습니까?`)) {
                return; 
            }

            const messageText = `나${menuName}이 ${price} 주문 접수되었습니다.`;
            
            fetch(NOTIFY_URL, {
                method: 'POST',
                headers: {
                    'Accept': 'application/json',
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    '주문내용': messageText
                })
            })
            .then(response => {
                if(response.ok) {
                    alert('주문이 완료되었습니다!');
                } else {
                    alert('주문 전송에 실패했습니다.');
                }
            })
            .catch(error => {
                console.error('Error:', error);
                alert('네트워크 오류가 발생했습니다.');
            });
        }
    </script>
</body>
</html>
